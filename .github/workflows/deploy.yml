name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      # Detects Bun from the committed bun.lock (L5). Fallback if detection
      # misbehaves: oven-sh/setup-bun + bun install && bun run build +
      # actions/upload-pages-artifact — never switch to npm.
      # build-cmd runs `bun run check` = build + contrast/discipline/copy
      # gates, so a regression fails CI before the artifact is uploaded.
      # (check:copy skips cleanly in CI — the kerby source clone isn't present.)
      - name: Build and gate with Astro
        uses: withastro/action@v6
        with:
          build-cmd: bun run check

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
